name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up Gradle 8.8
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Build
        run: gradle wrapper --gradle-version 8.13 && ./gradlew build
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: playerwatch-mod
          path: build/libs/*.jar
